<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body class="bg-black via-purple-500 to-pink-500 min-h-screen flex items-center justify-center">

<div class="bg-white w-[95%] md:w-[650px] rounded-2xl shadow-2xl p-8">

    <h1 class="text-4xl font-bold text-center mb-6">
        📝 Todo App
    </h1>

    <!-- Input -->
    <div class="flex gap-3">

        <input
        id="taskInput"
        type="text"
        placeholder="Enter your task..."
        class="flex-1 border-2 border-gray-300 rounded-lg px-4 py-3 outline-none focus:border-indigo-500">

        <button
        id="addBtn"
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 rounded-lg">
            Add
        </button>

    </div>

    <!-- Filter Buttons -->
    <div class="flex justify-center gap-3 mt-6">

        <button class="filterBtn bg-indigo-500 text-white px-4 py-2 rounded-lg" data-filter="all">
            All
        </button>

        <button class="filterBtn bg-green-500 text-white px-4 py-2 rounded-lg" data-filter="active">
            Active
        </button>

        <button class="filterBtn bg-yellow-500 text-white px-4 py-2 rounded-lg" data-filter="completed">
            Completed
        </button>

    </div>

    <!-- Task List -->
    <div id="taskList" class="mt-8 space-y-4">

    </div>

</div>

<script >

    const taskInput = document.getElementById("taskInput");
const addBtn = document.getElementById("addBtn");
const taskList = document.getElementById("taskList");
const filterBtns = document.querySelectorAll(".filterBtn");

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let currentFilter = "all";

// Save Tasks
function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

// Display Tasks
function displayTasks() {

    taskList.innerHTML = "";

    let filteredTasks = tasks;

    if (currentFilter === "active") {
        filteredTasks = tasks.filter(task => !task.completed);
    }

    if (currentFilter === "completed") {
        filteredTasks = tasks.filter(task => task.completed);
    }

    if (filteredTasks.length === 0) {
        taskList.innerHTML = `
        <p class="text-center text-gray-500">
            No Tasks Found
        </p>`;
        return;
    }

    filteredTasks.forEach((task) => {

        const realIndex = tasks.indexOf(task);

        const div = document.createElement("div");

        div.className =
            "bg-gray-100 rounded-xl p-4 flex justify-between items-center";

        div.innerHTML = `

        <div class="flex items-center gap-3">

            <input
                type="checkbox"
                class="w-5 h-5"
                ${task.completed ? "checked" : ""}
                onchange="toggleTask(${realIndex})"
            >

            <span class="${task.completed ? "line-through text-gray-500" : "font-medium"}">
                ${task.text}
            </span>

        </div>

        <div class="flex gap-2">

            <button
                onclick="editTask(${realIndex})"
                class="bg-blue-500 text-white px-3 py-1 rounded hover:bg-blue-600">

                Edit

            </button>

            <button
                onclick="deleteTask(${realIndex})"
                class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">

                Delete

            </button>

        </div>

        `;

        taskList.appendChild(div);

    });

}

// Add Task
addBtn.addEventListener("click", addTask);

taskInput.addEventListener("keypress", function (e) {
    if (e.key === "Enter") {
        addTask();
    }
});

function addTask() {

    const text = taskInput.value.trim();

    if (text === "") {
        alert("Please Enter Task");
        return;
    }

    tasks.push({
        text: text,
        completed: false
    });

    taskInput.value = "";

    saveTasks();
    displayTasks();

}

// Delete Task
function deleteTask(index) {

    if (confirm("Delete this task?")) {
        tasks.splice(index, 1);
        saveTasks();
        displayTasks();
    }

}

// Edit Task
function editTask(index) {

    const updated = prompt("Edit Task", tasks[index].text);

    if (updated !== null && updated.trim() !== "") {

        tasks[index].text = updated.trim();

        saveTasks();
        displayTasks();

    }

}

// Complete Task
function toggleTask(index) {

    tasks[index].completed = !tasks[index].completed;

    saveTasks();

    displayTasks();

}

// Filter
filterBtns.forEach(btn => {

    btn.addEventListener("click", () => {

        currentFilter = btn.dataset.filter;

        filterBtns.forEach(b => {
            b.classList.remove("ring-4", "ring-indigo-300");
        });

        btn.classList.add("ring-4", "ring-indigo-300");

        displayTasks();

    });

});

// Initial Load
displayTasks();

</script>

</body>
</html>
